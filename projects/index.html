<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="All of Francesco's projects — Game Developer" />
  <title>Projects — Francesco Brancato</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-Avb2QiuDEEvB4bZJYdft2mNjVShBftLdPG8FJ0V7irTLQ8Uo0qcPxh4Plq7G5tGm0rU+1SPhVotteLpBERwTkw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

  <!-- NAV -->
  <header class="nav" id="nav">
    <div class="nav__container container container--wide">
      <a href="../index.html" class="nav__logo">Francesco Brancato</a>
      <nav class="nav__links" id="nav-links" aria-label="Main navigation">
        <a href="index.html" class="nav__link active">Projects</a>
        <a href="../index.html#about" class="nav__link">About</a>
        <a href="../index.html#contact" class="nav__link">Contact</a>
      </nav>
      <button class="nav__hamburger" id="hamburger" aria-label="Menu" aria-expanded="false" aria-controls="nav-links">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>

  <main>

    <!-- PAGE HEADER -->
    <div class="page-header">
      <div class="container">
        <a href="../index.html" class="page-header__back"><i class="fas fa-arrow-left"></i> Home</a>
        <h1 class="section__title">Projects</h1>
        <p class="section__sub">All my projects — personal work, collaborations and game jams.</p>
      </div>
    </div>

    <!-- PROJECTS GRID -->
    <section class="section">
      <div class="container">

        <!-- FILTER TABS -->
        <div class="projects-page__filters" role="group" aria-label="Filter by category">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="solo">Solo</button>
          <button class="filter-btn" data-filter="group">Group</button>
          <button class="filter-btn" data-filter="game-jam">Game Jam</button>
        </div>

        <!-- GRID — popolata da js/projects.js -->
        <div class="projects-page__grid" id="projects-grid"></div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 Francesco Brancato. Built with plain HTML/CSS/JS.</p>
    </div>
  </footer>

  <script src="../js/projects.js"></script>
  <script>
    // Hamburger
    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('nav-links');
    hamburger.addEventListener('click', () => {
      const isOpen = navLinks.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', String(isOpen));
    });

    // Filter tabs — le card sono già nel DOM perché projects.js è caricato prima
    const filterBtns = document.querySelectorAll('.filter-btn');
    const cards = document.querySelectorAll('#projects-grid .card');

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        cards.forEach(card => {
          const cats = card.dataset.category.split(' ');
          if (filter === 'all' || cats.includes(filter)) {
            card.removeAttribute('hidden');
          } else {
            card.setAttribute('hidden', '');
          }
        });
      });
    });
  </script>
</body>
</html>
